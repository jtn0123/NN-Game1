name: PR Title Lint

# Keep PR titles release-ready. python-semantic-release parses conventional
# commit subjects on main; this also protects future squash merges where the
# PR title becomes the release input.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check title matches Conventional Commits
        uses: amannn/action-semantic-pull-request@v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            style
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            The PR title subject "{subject}" should start with a lowercase
            letter after the `type:` prefix. Example:
              fix: harden dashboard controls
