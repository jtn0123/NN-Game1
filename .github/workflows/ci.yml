name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            constraints.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -c constraints.txt

      - name: Format check
        run: make format-check

      - name: Lint
        run: make lint

      - name: Validate release config
        run: python .github/scripts/check_release_config.py

      - name: Type check focused core
        run: make typecheck

      - name: Dashboard JavaScript tests
        run: make dashboard-test

      - name: Test with coverage
        run: make coverage

      - name: Build package artifacts
        run: |
          python -m pip install build
          make build

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install audit tool
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit runtime dependencies
        run: make audit
