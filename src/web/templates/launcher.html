<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta name="dashboard-token" content="{{ access_token }}">
    <title>🧠 Neural Network AI - Game Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        window.DASHBOARD_ASSET_FAILURES = [];
        window.reportDashboardAssetFailure = function(assetName) {
            window.DASHBOARD_ASSET_FAILURES.push(assetName);
        };
    </script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js" crossorigin="anonymous" referrerpolicy="no-referrer" onerror="window.reportDashboardAssetFailure && window.reportDashboardAssetFailure('Socket.IO')"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='launcher.css') }}">
</head>
<body>
    <div class="bg-grid"></div>

    <div class="container">
        <h1>🧠 NEURAL NETWORK AI</h1>
        <p class="subtitle">Select a mode and game</p>

        <div class="mode-selector">
            <button class="mode-btn selected" id="mode-ai" data-mode="ai">
                <span class="mode-icon">🤖</span>
                <span>AI TRAINING</span>
            </button>
            <button class="mode-btn" id="mode-human" data-mode="human">
                <span class="mode-icon">🎮</span>
                <span>PLAY YOURSELF</span>
            </button>
        </div>
        <p class="mode-description" id="mode-desc">Train a neural network to master the game</p>

        <div class="games-grid" id="games-grid">
            <!-- Games loaded dynamically -->
        </div>
        
        <button class="start-btn" id="start-btn" disabled aria-disabled="true">
            SELECT A GAME
        </button>
        
        <div class="status-msg" id="status-msg"></div>
    </div>

    <script src="{{ url_for('static', filename='dashboard_core.js') }}"></script>
    <script src="{{ url_for('static', filename='launcher.js') }}"></script>
</body>
</html>
